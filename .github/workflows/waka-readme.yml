name: Waka Readme Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    name: Waka Stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "False"
          SHOW_PROJECTS: "True"
          SHOW_TIMEZONE: "False"
          SHOW_COMMIT: "False"
          SHOW_DAYS_OF_WEEK: "False"
          SHOW_LANGUAGE: "True"
          SHOW_EDITORS: "True"
          SHOW_LINES_OF_CODE: "False"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_LOC_CHART: "False"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_TOTAL_CODE_TIME: "True"
          LOCALE: "en"
          COMMIT_BY_ME: "True"
          COMMIT_MESSAGE: "Update waka stats"

      - name: Post-process waka block (theme + private project names)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git pull --rebase
          # Fetch public repo names for Arsh-S
          PUBLIC=$(gh api 'users/Arsh-S/repos?per_page=100&type=owner' --jq '.[] | select(.private==false) | .name' | tr '[:upper:]' '[:lower:]')
          export PUBLIC
          python3 <<'PY'
          import os, re
          public = set(os.environ['PUBLIC'].split())
          with open('README.md') as f: s = f.read()

          def rewrite_block(m):
              body = m.group(1)
              # 1. drop Code Time badge line
              body = re.sub(r'^!\[Code Time\][^\n]*\n?', '', body, flags=re.MULTILINE)
              # 2. drop "📊 **This Week I Spent My Time On**" header line(s)
              body = re.sub(r'^.*This Week I Spent My Time On.*\n?', '', body, flags=re.MULTILINE)
              # 3. drop "Last Updated on ..." footer
              body = re.sub(r'^\s*Last Updated on[^\n]*\n?', '', body, flags=re.MULTILINE)
              # 4. swap section emojis: cat -> folder, fire -> memo
              body = body.replace('🐱‍💻 Projects:', '📁 Projects:')
              body = body.replace('🔥 Editors:', '📝 Editors:')
              # 5. swap ```text -> ```jsoniq and inject "This Week's Coding:" header inside
              body = re.sub(r'^```text\s*$', "```jsoniq\n📊 This Week's Coding:\n\n", body, flags=re.MULTILINE)

              # 6. mask private project names
              def mask_projects(pm):
                  header = pm.group(1)
                  block = pm.group(2)
                  out_lines = []
                  for line in block.splitlines():
                      mm = re.match(r'^(\S[\S\-_.]*)(\s+)(\S.*)$', line)
                      if mm and mm.group(1).lower() not in public:
                          col_w = len(mm.group(1)) + len(mm.group(2))
                          out_lines.append('[private]'.ljust(col_w) + mm.group(3))
                      else:
                          out_lines.append(line)
                  return header + '\n'.join(out_lines)

              body = re.sub(r'(📁 Projects:\s*\n)((?:[^\n]+\n)*?)(?=\n|```|$)',
                            mask_projects, body)

              # ensure closing fence ``` is on its own line
              body = re.sub(r'[ \t]+```(\s*)$', r'\n```\1', body, flags=re.MULTILINE)
              # collapse blank lines inside the code block (saves vertical space)
              def collapse(cm):
                  lang = cm.group(1)
                  inner = cm.group(2)
                  inner = re.sub(r'\n[ \t]*\n+', '\n', inner)
                  return f'```{lang}\n{inner}\n```'
              body = re.sub(r'```(\w+)\n(.*?)\n```', collapse, body, flags=re.DOTALL)
              # indent data rows under their section headers for readability
              def indent_data(cm):
                  lang = cm.group(1)
                  inner = cm.group(2)
                  new = []
                  for line in inner.split('\n'):
                      st = line.rstrip()
                      if st == '' or st.endswith(':'):
                          new.append(line)
                      else:
                          new.append('  ' + line)
                  return f'```{lang}\n' + '\n'.join(new) + '\n```'
              body = re.sub(r'```(\w+)\n(.*?)\n```', indent_data, body, flags=re.DOTALL)
              # collapse 3+ blank lines to 2 outside code blocks
              body = re.sub(r'\n{3,}', '\n\n', body)
              return f"<!--START_SECTION:waka-->{body}<!--END_SECTION:waka-->"

          s = re.sub(r'<!--START_SECTION:waka-->(.*?)<!--END_SECTION:waka-->', rewrite_block, s, flags=re.DOTALL)
          with open('README.md', 'w') as f: f.write(s)
          PY
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Theme + privacy mask waka block"
            git push
          fi
